<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Ahmed Saad</title>
  <meta name="description" content="The page you're looking for doesn't exist.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="index.css">
  <style>
    /* 404-specific styles — piggybacks on the portfolio's design system */
    #not-found {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      position: relative;
    }

    .nf-container {
      max-width: 600px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .nf-code-block {
      font-family: var(--font-mono);
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 2rem 2.5rem;
      width: 100%;
      text-align: left;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: var(--shadow-lg);
    }

    .nf-prompt {
      color: var(--secondary);
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .nf-prompt-symbol {
      color: var(--primary);
    }

    .nf-error-number {
      font-size: clamp(5rem, 18vw, 9rem);
      font-weight: 800;
      line-height: 1;
      font-family: var(--font-mono);
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.04em;
      margin-bottom: 0.25rem;
    }

    .nf-error-label {
      font-size: 0.8rem;
      font-family: var(--font-mono);
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .nf-output {
      margin-top: 1rem;
      font-size: 0.83rem;
      color: var(--text-muted);
      line-height: 1.7;
    }

    .nf-output .out-line {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      padding: 0.15rem 0;
    }

    .nf-output .out-key {
      color: var(--secondary);
      min-width: 80px;
      flex-shrink: 0;
    }

    .nf-output .out-val {
      color: var(--text-main);
    }

    .nf-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .nf-logo {
      font-family: var(--font-mono);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-main);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      margin-bottom: 0.5rem;
    }

    .nf-logo span {
      color: var(--primary);
    }

    .nf-cursor {
      display: inline-block;
      width: 8px;
      height: 1.1em;
      background: var(--secondary);
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
      margin-left: 2px;
      border-radius: 1px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* Reuse bg-glow decorations from main site */
    .bg-glow-1 {
      top: 5%;
      left: -15%;
      opacity: 0.12;
    }

    .bg-glow-2 {
      bottom: 10%;
      right: -10%;
      opacity: 0.12;
    }
  </style>
</head>
<body>

  <div class="bg-glow-1" aria-hidden="true"></div>
  <div class="bg-glow-2" aria-hidden="true"></div>

  <main id="not-found" aria-labelledby="nf-heading">
    <div class="nf-container">

      <a href="/" class="nf-logo" aria-label="Ahmed Saad — Return home">
        <span>&lt;</span>AhmedSaad<span>/&gt;</span>
      </a>

      <div class="nf-code-block" role="img" aria-label="Terminal output showing 404 error">
        <div class="nf-prompt">
          <span class="nf-prompt-symbol">$</span>
          <span>http GET /requested-url</span>
          <span class="nf-cursor" aria-hidden="true"></span>
        </div>

        <div class="nf-error-number" id="nf-heading" aria-label="Error 404">404</div>
        <div class="nf-error-label">Not Found</div>

        <div class="nf-output" aria-label="Error details">
          <div class="out-line">
            <span class="out-key">status:</span>
            <span class="out-val">404 — The page does not exist on this server.</span>
          </div>
          <div class="out-line">
            <span class="out-key">message:</span>
            <span class="out-val">Route not registered in the application router.</span>
          </div>
          <div class="out-line">
            <span class="out-key">suggestion:</span>
            <span class="out-val">Head back home or check the URL for a typo.</span>
          </div>
        </div>
      </div>

      <div class="nf-actions">
        <a href="/" class="btn btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Back to Portfolio
        </a>
        <a href="/#contact" class="btn btn-secondary">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          Contact Ahmed
        </a>
      </div>

    </div>
  </main>

  <script>
    // Apply saved theme preference
    const theme = localStorage.getItem("theme") || "dark";
    document.documentElement.setAttribute("data-theme", theme);
  </script>
</body>
</html>
